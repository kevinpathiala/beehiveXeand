<title>Beehive — Business Eligibility Check</title>

<!--
  ============================================================================
  BEEHIVE LEAD MAGNET — Eligibility Check Form (Webflow Self-Contained)
  ============================================================================
  Single-file build. All JSX components inlined below.
  - Fonts: uses Suisse Intl from the Webflow site (no @font-face needed).
  - HUBSPOT CONFIG: search "HUBSPOT_CONFIG" below to set portal + form GUID.
  - Eligibility logic: search "qualifyLead" below.
  Paste this entire file into a Webflow Embed (or page Custom Code).
  ============================================================================
-->

<style>
  :root {
    /* Beehive palette */
    --shine-white: #FFFFFF;
    --sunrise-red: #E00800;
    --deep-ocean: #0F1430;
    --emerald: #47CB6C;
    --burgundy: #4B0F1E;

    /* Theme tokens — overridden by Tweaks */
    --bg: var(--deep-ocean);
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.08);
    --surface-selected: rgba(224,8,0,0.12);
    --border: rgba(255,255,255,0.12);
    --border-strong: rgba(255,255,255,0.22);
    --border-selected: var(--sunrise-red);
    --text: #FFFFFF;
    --text-muted: rgba(255,255,255,0.62);
    --text-faint: rgba(255,255,255,0.42);
    --accent: var(--sunrise-red);
    --accent-text: #FFFFFF;
    --success: var(--emerald);

    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;

    --font: 'Suisse Intl', 'Suisse Int\'l', "Suisse Int'l", 'Inter Tight', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;

    --ease-onward: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; }

  /* Scope all styles to #beehive-form so Webflow's page styles aren't affected */
  #beehive-form {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    /* Subtle hexagon graphic — brand spec: never show more than 2 corners */
    background-image:
      radial-gradient(ellipse at 100% -10%, rgba(224,8,0,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at -10% 110%, rgba(71,203,108,0.08) 0%, transparent 50%);
    background-attachment: fixed;
  }

  body.theme-light {
    --bg: #FFFFFF;
    --surface: #FFFFFF;
    --surface-hover: #F7F6F2;
    --surface-selected: rgba(224,8,0,0.05);
    --border: rgba(15,20,48,0.10);
    --border-strong: rgba(15,20,48,0.18);
    --border-selected: var(--sunrise-red);
    --text: var(--deep-ocean);
    --text-muted: rgba(15,20,48,0.64);
    --text-faint: rgba(15,20,48,0.44);
    --accent: var(--sunrise-red);
    background-image: none;
  }

  /* Form container — sized to fit inside Webflow page flow, not full viewport */
  #beehive-form .stage {
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }
  #beehive-form .main {
    padding-bottom: 24px !important;
  }
  #beehive-form .footer-nav {
    position: static !important;
    background: transparent !important;
    padding-top: 8px !important;
  }

  /* Restart row (shown above progress when going back is possible) */
  .restart-row {
    display: flex;
    justify-content: flex-end;
    padding: 14px 20px 0;
  }
  .restart-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 200ms;
  }
  .restart-btn:hover {
    color: var(--text);
    border-color: var(--border-strong);
    background: var(--surface);
  }

  /* Progress */
  .progress-wrap {
    padding: 0 20px 8px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .progress-meta strong {
    color: var(--text);
    font-weight: 500;
  }
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 900ms var(--ease-onward);
    position: relative;
  }
  .progress-fill::after {
    /* Onward Motion glow */
    content: '';
    position: absolute;
    right: -8px; top: -3px; bottom: -3px;
    width: 16px;
    background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
    opacity: 0.6;
  }

  /* Stepper variant */
  .stepper {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .stepper-dot {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 999px;
    transition: background 400ms var(--ease-onward);
  }
  .stepper-dot.done { background: var(--accent); }
  .stepper-dot.current { background: var(--text); }

  /* Main content */
  #beehive-form .main {
    flex: 1;
    padding: 24px 20px 60px;
    max-width: 560px;
    width: 100%;
    margin: 0 auto;
    position: relative;
  }

  .step {
    animation: stepFade 500ms var(--ease-onward) both;
  }
  @keyframes stepFade {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  /* Smooth staggered rise of each element within a step */
  @media (prefers-reduced-motion: no-preference) {
    .step > * {
      animation: stepRise 720ms var(--ease-onward) backwards;
    }
    .step > *:nth-child(1) { animation-delay: 60ms; }
    .step > *:nth-child(2) { animation-delay: 180ms; }
    .step > *:nth-child(3) { animation-delay: 300ms; }
    .step > *:nth-child(4) { animation-delay: 410ms; }
    .step > *:nth-child(5) { animation-delay: 510ms; }
    .step > *:nth-child(n+6) { animation-delay: 590ms; }
  }
  @keyframes stepRise {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: none; }
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .eyebrow-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
  }

  h1.q-title {
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.1;
    margin: 0 0 12px;
    text-wrap: balance;
  }
  .q-sub {
    color: var(--text-muted);
    font-size: 17px;
    line-height: 1.5;
    margin: 0 0 32px;
    text-wrap: pretty;
  }

  /* Card-style options */
  .options {
    display: grid;
    gap: 10px;
  }
  .options.cols-2 {
    grid-template-columns: 1fr 1fr;
  }
  .opt {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 18px 18px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 200ms var(--ease-onward);
    position: relative;
    overflow: hidden;
  }
  .opt:hover {
    background: var(--surface-hover);
    border-color: var(--border-strong);
    transform: translateY(-1px);
  }
  .opt.selected {
    background: var(--surface-selected);
    border-color: var(--border-selected);
  }
  .opt.selected::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    box-shadow: inset 0 0 0 1px var(--border-selected);
    pointer-events: none;
  }
  .opt-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--surface-hover);
    display: grid; place-items: center;
    flex-shrink: 0;
    color: var(--text);
  }
  .opt.selected .opt-icon {
    background: var(--accent);
    color: var(--accent-text);
  }
  .opt-label {
    flex: 1;
    line-height: 1.2;
  }
  .opt-sub {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 2px;
  }
  .opt-check {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    flex-shrink: 0;
    display: grid;
    place-items: center;
    transition: all 200ms;
  }
  .opt.selected .opt-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .opt.selected .opt-check::after {
    content: '';
    width: 6px; height: 10px;
    border-right: 2px solid var(--accent-text);
    border-bottom: 2px solid var(--accent-text);
    transform: rotate(45deg) translate(-1px, -1px);
  }

  /* Slider */
  .slider-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px 24px 24px;
  }
  .slider-value {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 4px;
    font-variant-numeric: tabular-nums;
  }
  .slider-value-prefix {
    font-size: 22px;
    color: var(--text-muted);
    font-weight: 500;
    margin-right: 4px;
  }
  .slider-value-suffix {
    font-size: 18px;
    color: var(--text-muted);
    font-weight: 500;
    margin-left: 6px;
  }
  .slider-caption {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 999px;
    outline: none;
    margin: 0 0 12px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--text);
    cursor: grab;
    border: 4px solid var(--bg);
    box-shadow: 0 0 0 1px var(--border-strong), 0 4px 16px rgba(0,0,0,0.3);
    transition: transform 150ms;
  }
  input[type="range"]::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.1); }
  input[type="range"]::-moz-range-thumb {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--text);
    cursor: grab;
    border: 4px solid var(--bg);
    box-shadow: 0 0 0 1px var(--border-strong), 0 4px 16px rgba(0,0,0,0.3);
  }
  .slider-track-fill {
    position: relative;
    height: 4px;
    margin-top: -16px;
    margin-bottom: 12px;
    pointer-events: none;
    border-radius: 999px;
    background: var(--accent);
    transition: none;
  }
  .slider-bounds {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-faint);
  }

  /* Segmented */
  .segmented {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px;
    gap: 4px;
  }
  .seg-btn {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-muted);
    padding: 12px 16px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 200ms;
  }
  .seg-btn:hover { color: var(--text); }
  .seg-btn.active {
    background: var(--text);
    color: var(--bg);
  }

  /* Text inputs */
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }
  .field-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px 18px;
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    width: 100%;
    transition: all 200ms;
  }
  .input::placeholder { color: var(--text-faint); }
  .input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface-hover);
  }
  .input.error { border-color: var(--sunrise-red); }
  .input-error {
    color: var(--sunrise-red);
    font-size: 12px;
    margin-top: 4px;
  }

  .phone-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 8px;
  }

  /* Combined numbers step */
  .numbers-group {
    margin-bottom: 20px;
  }
  .numbers-group:last-child {
    margin-bottom: 0;
  }
  .numbers-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 10px;
  }

  /* e& sign-in (demo) */
  .eand-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--deep-ocean);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    padding: 16px 18px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 200ms var(--ease-onward), box-shadow 200ms var(--ease-onward);
  }
  .eand-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(15,20,48,0.25);
  }
  .eand-btn:disabled { opacity: 0.7; cursor: default; }
  .eand-mark {
    display: inline-grid;
    place-items: center;
    width: 30px; height: 26px;
    border-radius: 6px;
    background: #fff;
  }
  .eand-mark.sm { width: 26px; height: 22px; }
  .eand-logo-svg { height: 13px; width: auto; display: block; }
  .eand-mark.sm .eand-logo-svg { height: 11px; }
  .eand-hint {
    font-size: 12px;
    color: var(--text-faint);
    text-align: center;
    margin: 8px 0 0;
  }
  .eand-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-faint);
    font-size: 12px;
    margin: 18px 0;
  }
  .eand-divider::before,
  .eand-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .eand-linked {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    margin-bottom: 18px;
  }
  .eand-linked-text {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }
  .eand-unlink {
    background: transparent;
    border: none;
    color: var(--accent);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  /* Hide the step footer while the industry search sheet is open */
  body.combo-open #beehive-form .footer-nav { display: none; }

  /* Terms checkbox row */
  .tc-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 14px 16px;
    margin-top: 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    cursor: pointer;
    transition: border-color .12s ease, background .12s ease;
  }
  .tc-row:hover { border-color: var(--border-strong); }
  .tc-row.has-err { border-color: var(--sunrise-red); }
  .tc-row input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    flex: 0 0 18px;
    margin-top: 1px;
    border: 1.5px solid var(--border-strong);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: all .12s ease;
  }
  .tc-row input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .tc-row input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4px; top: 1px;
    width: 5px; height: 9px;
    border: solid var(--accent-text);
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .tc-text {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .tc-text a {
    color: var(--text);
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .tc-err {
    color: var(--sunrise-red);
    font-size: 12px;
    margin-top: 6px;
    padding-left: 4px;
  }

  /* Footer / nav — absolute inside .stage so it sits at the bottom of the form, not the viewport */
  #beehive-form .footer-nav {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    z-index: 10;
    pointer-events: none;
  }
  .footer-inner-col {
    max-width: 560px;
    margin: 0 auto;
    pointer-events: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .footer-inner {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn {
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    border-radius: 999px;
    padding: 16px 24px;
    border: none;
    cursor: pointer;
    transition: all 200ms var(--ease-onward);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: -0.01em;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-text);
    flex: 1;
    letter-spacing: 0.01em;
    font-size: 15px;
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(224,8,0,0.3);
  }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    width: 52px; height: 52px;
    padding: 0;
    border-radius: 50%;
  }
  .btn-ghost:hover {
    background: var(--surface);
    color: var(--text);
  }

  .submit-hint {
    font-size: 12px;
    color: var(--text-faint);
    text-align: center;
    margin-top: 12px;
  }

  /* Intro / welcome screen */
  #beehive-form .intro {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 64px 20px;
    min-height: 600px;
    flex: 1;
  }
  #beehive-form .intro-inner {
    max-width: 560px;
    width: 100%;
  }
  @keyframes beehiveFadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: none; }
  }
  @media (prefers-reduced-motion: no-preference) {
    #beehive-form .intro-inner > * {
      animation: beehiveFadeUp 1.5s cubic-bezier(0.22, 1, 0.36, 1) backwards;
    }
    #beehive-form .intro-title { animation-delay: 0.25s; }
    #beehive-form .intro-text { animation-delay: 0.75s; }
    #beehive-form .intro-cta { animation-delay: 1.2s; }
  }

  .intro-title {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin: 0 0 28px;
    text-wrap: balance;
  }
  .intro-text {
    color: var(--text-muted);
    font-size: 19px;
    line-height: 1.5;
    margin: 0 0 44px;
    text-wrap: pretty;
    max-width: 460px;
  }
  .intro-cta {
    flex: none;
    align-self: flex-start;
    padding-left: 32px;
    padding-right: 32px;
  }
  .intro-cta svg {
    transition: transform 300ms var(--ease-onward);
  }
  .intro-cta:hover svg {
    transform: translateX(5px);
  }
  @media (prefers-reduced-motion: no-preference) {
    .intro-cta svg {
      animation: arrowNudge 2.2s ease-in-out infinite;
    }
    .intro-cta:hover svg {
      animation: none;
      transform: translateX(5px);
    }
  }
  @keyframes arrowNudge {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(4px); }
  }
  @media (max-width: 480px) {
    .intro-title { font-size: 34px; }
    .intro-text { font-size: 16px; }
    #beehive-form .intro { padding: 40px 20px; }
  }

  /* Result screens */
  .result {
    padding-top: 8px;
  }
  .result-hero {

    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];

    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// Reusable form controls — option cards, slider, segmented, text inputs.

// ----- OptionCard: big tappable card, optional icon, auto-advance support -----
const OptionCard = ({ icon, label, sublabel, selected, onClick, showCheck = true }) => (
  <button
    type="button"
    className={`opt ${selected ? 'selected' : ''}`}
    onClick={onClick}
  >
    {icon && <span className="opt-icon">{icon}</span>}
    <span className="opt-label">
      {label}
      {sublabel && <div className="opt-sub">{sublabel}</div>}
    </span>
    {showCheck && <span className="opt-check" aria-hidden></span>}
  </button>
);

// ----- OptionGroup -----
const OptionGroup = ({ options, value, onChange, cols = 1, autoAdvance, onAutoAdvance, skipAdvanceFor = [] }) => {
  const handleClick = (val) => {
    onChange(val);
    if (autoAdvance && onAutoAdvance && !skipAdvanceFor.includes(val)) {
      // Small delay so user sees the selection feedback before advancing
      setTimeout(() => onAutoAdvance(), 280);
    }
  };
  return (
    <div className={`options ${cols === 2 ? 'cols-2' : ''}`}>
      {options.map((o) => (
        <OptionCard
          key={o.value}
          icon={o.icon}
          label={o.label}
          sublabel={o.sublabel}
          selected={value === o.value}
          onClick={() => handleClick(o.value)}
          showCheck={!autoAdvance}
        />
      ))}
    </div>
  );
};

// ----- Slider with formatted value, fill, bounds -----
const Slider = ({
  value,
  onChange,
  min,
  max,
  step = 1,
  prefix = '',
  suffix = '',
  caption,
  format = (v) => v.toLocaleString(),
  formatBound,
}) => {
  const clampedValue = Math.max(min, Math.min(max, value));
  const pct = ((clampedValue - min) / (max - min)) * 100;
  const fmtBound = formatBound || ((v) => `${prefix}${format(v)}${suffix}`);
  return (
    <div className="slider-wrap">
      <div className="slider-value">
        {prefix && <span className="slider-value-prefix">{prefix}</span>}
        {format(clampedValue)}
        {suffix && <span className="slider-value-suffix">{suffix}</span>}
      </div>
      {caption && <div className="slider-caption">{caption}</div>}
      <input
        type="range"
        min={min}
        max={max}
        step={step}
        value={clampedValue}
        onChange={(e) => onChange(Number(e.target.value))}
      />
      <div className="slider-track-fill" style={{ width: `calc(${pct}% - ${pct * 0.28}px)` }} />
      <div className="slider-bounds">
        <span>{fmtBound(min)}</span>
        <span>{fmtBound(max)}</span>
      </div>
    </div>
  );
};

// ----- Segmented (2–4 short options) -----
const Segmented = ({ options, value, onChange }) => (
  <div className="segmented">
    {options.map((o) => (
      <button

// ----- Searchable Combobox -----
// Big tappable trigger + searchable list. Used for the long industry list.
const Combobox = ({ value, onChange, options, placeholder = 'Search...', triggerLabel }) => {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState('');
  const inputRef = useRef(null);
  const selected = options.find((o) => o.value === value);

  useEffect(() => {
    if (open && inputRef.current) inputRef.current.focus();
    document.body.classList.toggle('combo-open', open);
    return () => document.body.classList.remove('combo-open');
  }, [open]);

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return options;
    return options.filter((o) => o.label.toLowerCase().includes(q));
  }, [query, options]);

  return (
    <div className="combobox">
      <button type="button" className={`combo-trigger ${selected ? 'has-value' : ''}`} onClick={() => setOpen(true)}>
        <span className="combo-trigger-label">
          {selected ? selected.label : (triggerLabel || 'Choose your industry')}
        </span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" width="18" height="18">
          <path d="M6 9l6 6 6-6" />
        </svg>
      </button>

      {open && (
        <div className="combo-overlay" onClick={() => setOpen(false)}>
          <div className="combo-sheet" onClick={(e) => e.stopPropagation()}>
            <div className="combo-search-row">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" width="18" height="18">
                <circle cx="11" cy="11" r="7" /><path d="M20 20l-3.5-3.5" />
              </svg>
              <input
                ref={inputRef}
                type="text"
                className="combo-search"
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder={placeholder}
              />
              <button type="button" className="combo-close" onClick={() => setOpen(false)} aria-label="Close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" width="18" height="18">
                  <path d="M6 6l12 12M18 6L6 18" />
                </svg>
              </button>
            </div>
            <div className="combo-list">
              {filtered.length === 0 && (
                <div className="combo-empty">No matches. Try a different keyword.</div>
              )}
              {filtered.map((o) => (
                <button
                  key={o.value}
                  type="button"
                  className={`combo-item ${value === o.value ? 'selected' : ''}`}
                  onClick={() => { onChange(o.value); setOpen(false); setQuery(''); }}
                >
                  <span>{o.label}</span>
                  {value === o.value && <Ico.check />}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ----- Multi-select option group -----
const MultiOptionGroup = ({ options, values = [], onChange, cols = 1 }) => {
  const toggle = (v) => {
    const set = new Set(values);
    if (set.has(v)) set.delete(v); else set.add(v);
    onChange(Array.from(set));
  };
  return (
    <div className={`options ${cols === 2 ? 'cols-2' : ''}`}>
      {options.map((o) => (
        <button
          key={o.value}
          type="button"
          className={`opt ${values.includes(o.value) ? 'selected' : ''}`}
          onClick={() => toggle(o.value)}
        >
          {o.icon && <span className="opt-icon">{o.icon}</span>}
          <span className="opt-label">
            {o.label}
            {o.sublabel && <div className="opt-sub">{o.sublabel}</div>}
          </span>
          <span className="opt-check" aria-hidden></span>
        </button>
      ))}
    </div>
  );
};

  if (v >= 1_000) return (v / 1_000).toFixed(0) + 'K';
  return String(v);
};

  return (
    <>
      <div className="eyebrow"><span className="eyebrow-dot" />Almost there</div>
      <h1 className="q-title">Where should we send your result?</h1>
      <p className="q-sub">A Beehive advisor will reach out within one working day.</p>

      {!linked ? (
        <>
          <button type="button" className="eand-btn" onClick={linkEand} disabled={linking}>
            {linking
              ? <><span className="spinner" /> Connecting to e&hellip;</>
              : <>Continue with <span className="eand-mark"><EandLogo className="eand-logo-svg" /></span></>}
          </button>
          <p className="eand-hint">Sign in with your e&amp; business account to fill your details instantly.</p>
          <div className="eand-divider"><span>or enter your details</span></div>
        </>
      ) : (
        <div className="eand-linked">
          <span className="eand-mark sm"><EandLogo className="eand-logo-svg" /></span>
          <span className="eand-linked-text">Details filled from your e&amp; account</span>
          <button type="button" className="eand-unlink" onClick={unlink}>Change</button>
        </div>
      )}

      <TextField label="Your name" value={data.name} onChange={(v) => set({ name: v })} placeholder="First and last name" error={errors.name} autoFocus />
      <TextField label="Business name" value={data.businessName} onChange={(v) => set({ businessName: v })} placeholder="Trading or legal name" error={errors.businessName} />
      <TextField label="Work email" type="email" inputMode="email" value={data.email} onChange={(v) => set({ email: v })} placeholder="you@business.com" error={errors.email} />
      <PhoneField label="Mobile number" codeValue={data.phoneCode} codeOptions={codeOptions} numberValue={data.phone} onCodeChange={(v) => set({ phoneCode: v })} onNumberChange={(v) => set({ phone: v })} error={errors.phone} />

      <label className={`tc-row ${errors.terms ? 'has-err' : ''}`}>
        <input
          type="checkbox"
          checked={!!data.terms}
          onChange={(e) => set({ terms: e.target.checked })}
        />
        <span className="tc-text">
          I agree to Beehive's <a href="https://www.beehive.ae/terms-and-conditions" target="_blank" rel="noopener">Terms of Service</a> and <a href="https://www.beehive.ae/privacy-policy" target="_blank" rel="noopener">Privacy Policy</a>, and consent to being contacted about my application.
        </span>
      </label>
      {errors.terms && <div className="tc-err">{errors.terms}</div>}
    </>
  );
};

Object.assign(window, {

// === form-app.jsx ===

// Main app — orchestrates steps, progress, navigation, results, HubSpot submit.

// ============================================================================
// HUBSPOT_CONFIG — replace these with your portal + form IDs.
// ============================================================================
window.HUBSPOT_CONFIG = {
  portalId: 'YOUR_PORTAL_ID',
  formGuid: 'YOUR_FORM_GUID',
};
window.BEEHIVE_FIELD_MAP = {
  email: 'email',
  phone: 'phone',
  businessName: 'company',
  country: 'country_of_business',
  businessAge: 'age_of_business_range',
  sector: 'product_market_sector',
  industry: 'industry',
  revenue: 'monthly_revenue_aed',
  audited: 'audited_accounts',
  loanAmount: 'form_funding_amount',
  purposes: 'funding_purpose',
  qualified: 'eligibility_status',
  indicativeOffer: 'indicative_offer_aed',
};

// ============================================================================
// Eligibility logic
// ============================================================================
const qualifyLead = (data) => {
  // We don't lend to businesses under 2 years old
  if (['<6', '6-12', '1-2'].includes(data.businessAge)) return { qualified: false, reason: 'age' };
  // Annual revenue must be at least 2M AED
  if (data.revenue < 2_000_000) return { qualified: false, reason: 'revenue' };
  return { qualified: true };
};

// ============================================================================
// Validation
// ============================================================================
const validateContact = (data) => {
  const e = {};
  if (!data.name || data.name.trim().length < 2) e.name = 'Please enter your name';
  if (!data.businessName || data.businessName.trim().length < 2) e.businessName = 'Please enter your business name';
  if (!data.email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) e.email = 'Enter a valid email';
  if (!data.phone || data.phone.replace(/\s/g, '').length < 6) e.phone = 'Enter a valid mobile number';
  if (!data.terms) e.terms = 'Please accept the Terms and Privacy Policy to continue';
  return e;
};

// ============================================================================
// HubSpot submit
// ============================================================================
const submitToHubSpot = async (data, result) => {
  const cfg = window.HUBSPOT_CONFIG;
  if (!cfg.portalId || cfg.portalId === 'YOUR_PORTAL_ID') {
    console.warn('[Beehive] HubSpot not configured. Simulating submit.', data, result);
    await new Promise((r) => setTimeout(r, 900));
    return { ok: true, simulated: true };
  }
  const map = window.BEEHIVE_FIELD_MAP;
  const [firstname, ...rest] = (data.name || '').trim().split(/\s+/);
  const lastname = rest.join(' ');
  const fields = [
    { objectTypeId: '0-1', name: 'firstname', value: firstname || '' },
    { objectTypeId: '0-1', name: 'lastname', value: lastname || '' },
    { objectTypeId: '0-1', name: map.email, value: data.email },
    { objectTypeId: '0-1', name: map.phone, value: `${data.phoneCode}${data.phone.replace(/\s/g, '')}` },
    { objectTypeId: '0-1', name: map.businessName, value: data.businessName },
    { objectTypeId: '0-1', name: map.businessAge, value: ({ '<6': 'Under 6 Months', '6-12': '6 - 12 Months', '1-2': '1 - 2 Years', '2+': '2+ Years' }[data.businessAge] || '') },
    { objectTypeId: '0-1', name: map.sector, value: labelForSector(data.sector) },
    { objectTypeId: '0-1', name: map.industry, value: data.industry },
    { objectTypeId: '0-1', name: map.revenue, value: String(data.revenue) },
    { objectTypeId: '0-1', name: map.loanAmount, value: String(data.loanAmount) },
    { objectTypeId: '0-1', name: map.qualified, value: result.qualified ? 'Eligible' : 'Not eligible' },
    // Company object — the form has a required "Company name" field (0-2/name)
    { objectTypeId: '0-2', name: 'name', value: data.businessName },
  ];
  const url = `https://api.hsforms.com/submissions/v3/integration/submit/${cfg.portalId}/${cfg.formGuid}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields, context: { pageUri: window.location.href, pageName: document.title } }),
  });
  if (!res.ok) {
    const detail = await res.text().catch(() => '');
    console.error('[Beehive] HubSpot rejected the submission:', res.status, detail);
  } else {
    console.info('[Beehive] HubSpot submission accepted.');
  }
  return { ok: res.ok };
};

// ============================================================================
// Persistence (cache answers across reload + restart)
// ============================================================================
const STORAGE_KEY = 'beehive_eand_eligibility_v1';
const loadCache = () => {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch { return null; }
};
const saveCache = (data) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
};

const DEFAULT_DATA = {
  businessAge: '', sector: '', industry: '',
  revenue: 3_000_000, loanAmount: 500_000, revenueTouched: false, loanTouched: false,
  name: '', businessName: '', email: '', phoneCode: '+971', phone: '', terms: false, eandLinked: false,
};

// ============================================================================
// App
// ============================================================================
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "progressStyle": "bar",
  "accent": "#E00800"
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweak] = (window.useTweaks ? window.useTweaks(TWEAK_DEFAULTS) : [TWEAK_DEFAULTS, () => {}]);

  useEffect(() => {
    document.body.classList.toggle('theme-light', tweaks.theme === 'light');
    document.documentElement.style.setProperty('--accent', tweaks.accent || '#E00800');
  }, [tweaks.theme, tweaks.accent]);

  // Load cached answers on mount
  const [data, setData] = useState(() => ({ ...DEFAULT_DATA, ...(loadCache() || {}) }));
  const set = (patch) => setData((d) => {
    const next = { ...d, ...patch };
    saveCache(next);
    return next;
  });

  const [stepIdx, setStepIdx] = useState(0);
  const [started, setStarted] = useState(false);
  const [errors, setErrors] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [done, setDone] = useState(null);

  const steps = useMemo(() => ([
    { id: 'age', component: StepAge, isValid: () => !!data.businessAge },
    { id: 'sector', component: StepSectorIndustry, isValid: () => !!data.sector && !!data.industry },
    { id: 'numbers', component: StepNumbers, isValid: () => data.revenue >= 0 && data.loanAmount > 0 },
    { id: 'contact', component: StepContact, isValid: () => Object.keys(validateContact(data)).length === 0 },
  ]), [data]);

  const total = steps.length;
  const current = steps[stepIdx];
  const StepComp = current?.component;

  const next = useCallback(() => {
    if (stepIdx < total - 1) {
      let i = stepIdx + 1;
      while (i < total - 1 && steps[i].skip && steps[i].skip()) i++;
      setStepIdx(i); setErrors({});
    }
  }, [stepIdx, total, steps]);

  const back = useCallback(() => {
    if (stepIdx > 0) {
      let i = stepIdx - 1;
      while (i > 0 && steps[i].skip && steps[i].skip()) i--;
      setStepIdx(i); setErrors({});
    }
  }, [stepIdx, steps]);

  const handleSubmit = async () => {
    const v = validateContact(data);
    if (Object.keys(v).length) { setErrors(v); return; }
    setSubmitting(true);
    const result = qualifyLead(data);
    try {
      await submitToHubSpot(data, result);
      setDone(result);
    } catch (err) {
      console.error('[Beehive] submit failed', err);
      setDone(result);
    } finally {
      setSubmitting(false);
    }
  };

  const handleNext = () => {
    if (current.id === 'contact') return handleSubmit();
    if (!current.isValid()) return;
    next();
  };

  const restart = () => {
    // Cache stays. Just rewind to step 0.
    setDone(null);
    setStepIdx(0);
    setErrors({});
  };

  const startFresh = () => {
    // Wipe cache + state
    localStorage.removeItem(STORAGE_KEY);
    setData({ ...DEFAULT_DATA });
    setDone(null);
    setStepIdx(0);
    setErrors({});
  };

  // Keyboard: Enter advances
  useEffect(() => {
    const onKey = (e) => {
      if (done) return;
      if (e.key === 'Enter' && current?.isValid()) {
        e.preventDefault();
        handleNext();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [stepIdx, data, done]);

  // Smarter progress: completed steps / total. Reaches 100% only on submit.
  const progress = (stepIdx / total) * 100;

  // Detect if we have meaningful cached data (other than defaults)
  const hasCachedData = data.businessAge || data.sector || data.industry;

  return (
    <div className="stage">
      {!done && !started && (
        <div className="intro">
          <div className="intro-inner">
            <h1 className="intro-title">Your funding journey starts here</h1>
            <p className="intro-text">Take a 2-minute check to see what funding could look like for your business.</p>
            <button className="btn btn-primary intro-cta" onClick={() => setStarted(true)}>Begin<Ico.arrowRight /></button>
          </div>
        </div>
      )}

      {!done && started && stepIdx > 0 && hasCachedData && (
        <div className="restart-row">
          <button className="restart-btn" onClick={restart} title="Go back to the first step, keeping your answers">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" width="14" height="14"><path d="M3 12a9 9 0 1 0 3-6.7L3 8" /><path d="M3 3v5h5" /></svg>
            Go back and check
          </button>
        </div>
      )}

      {!done && started && (
        <div className="progress-wrap">
          {tweaks.progressStyle === 'stepper' ? (
            <>
              <div className="progress-meta">
                <span><strong>Step {stepIdx + 1}</strong> of {total}</span>
                <span>{Math.round(progress)}%</span>
              </div>
              <div className="stepper">
                {steps.map((s, i) => (
                  <div key={s.id} className={`stepper-dot ${i < stepIdx ? 'done' : ''} ${i === stepIdx ? 'current' : ''}`} />
                ))}
              </div>
            </>
          ) : (
            <>
              <div className="progress-meta">
                <span><strong>Question {stepIdx + 1}</strong> of {total}</span>
                <span>Onward</span>
              </div>
              <div className="progress-bar">
                <div className="progress-fill" style={{ width: `${progress}%` }} />
              </div>
            </>
          )}
        </div>
      )}

      <main className="main">
        {!done && started && StepComp && (
          <div key={current.id} className="step">
            <StepComp data={data} set={set} next={next} errors={errors} />
          </div>
        )}
        {done && <ResultScreen data={data} result={done} onRestart={restart} onStartFresh={startFresh} />}
      </main>

      {!done && started && (
        <div className="footer-nav">
          <div className="footer-inner-col">
            <div className="footer-inner">
              <button className="btn btn-back" onClick={() => stepIdx === 0 ? setStarted(false) : back()}>Back</button>
              <button
                className="btn btn-primary"
                onClick={handleNext}
                disabled={!current.isValid() || submitting}
              >
                {submitting ? <><span className="spinner" /> Sending...</> : (current.id === 'contact' ? 'Get My Eligibility' : 'Continue')}
              </button>
            </div>
          </div>
        </div>
      )}

      {window.TweaksPanel && (
        <TweaksPanel title="Tweaks">
          <TweakSection title="Visual">
            <TweakRadio
              label="Theme"
              value={tweaks.theme}
              onChange={(v) => setTweak('theme', v)}
              options={[{ value: 'dark', label: 'Dark' }, { value: 'light', label: 'Light' }]}
            />
            <TweakRadio
              label="Progress"
              value={tweaks.progressStyle}
              onChange={(v) => setTweak('progressStyle', v)}
              options={[{ value: 'bar', label: 'Bar' }, { value: 'stepper', label: 'Stepper' }]}
            />
            <TweakColor label="Accent" value={tweaks.accent} onChange={(v) => setTweak('accent', v)} />
          </TweakSection>
          <TweakSection title="Demo">
            <TweakButton onClick={() => {
              const demo = {
                businessAge: '2+', sector: 'trading', industry: 'RETAIL',
                revenue: 4_000_000, loanAmount: 500_000, revenueTouched: true, loanTouched: true,
                name: 'Yusuf Al Rashid', businessName: 'Hive Trading LLC',
                email: 'yusuf@hivetrading.ae', phoneCode: '+971', phone: '50 123 4567', terms: true,
              };
              setData(demo); saveCache(demo); setStepIdx(steps.length - 1);
            }}>Fill demo data</TweakButton>
            <TweakButton onClick={startFresh}>Wipe cache and reset</TweakButton>
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
};

// ============================================================================
// Result screen
// ============================================================================
const ResultScreen = ({ data, result, onRestart, onStartFresh }) => {
  const { qualified, reason } = result;
  const firstName = (data.name || '').split(' ')[0];

  const headline = qualified
    ? `Great news, ${firstName}.`
    : `Thanks, ${firstName}.`;

  const message = qualified
    ? `Based on what you've shared, your business looks like a strong fit for Beehive funding. A representative will be in touch as soon as possible to walk you through the next steps.`
    : reason === 'age'
      ? `Unfortunately, Beehive currently funds businesses that have been trading for over 2 years. Once you cross that mark, we'd love to hear from you again.`
      : `Unfortunately, your annual revenue is below our current funding threshold of AED 2,000,000. Let's stay in touch as your business grows.`;

  return (
    <div className="result">
      <div className="result-hero">
        <h1 className="result-title">{headline}</h1>
        <p className="result-lead">{message}</p>
      </div>

      {qualified && (
        <ol className="next-steps">
          <li>
            <span className="next-num">1</span>
            <div className="next-text"><strong>Confirmation call</strong><span>A Beehive representative reaches out as soon as possible.</span></div>
          </li>
          <li>
            <span className="next-num">2</span>
            <div className="next-text"><strong>Share documents</strong><span>Trade licence and bank statements, all uploaded in your portal.</span></div>
          </li>
          <li>
            <span className="next-num">3</span>
            <div className="next-text"><strong>Get funded</strong><span>Most decisions in 48 hours. Funds in your account fast.</span></div>
          </li>
        </ol>
      )}

      <div className="result-actions">
        <button className="btn btn-text" onClick={onStartFresh}>Start fresh</button>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  <!-- Event tracking → GTM dataLayer + parent postMessage -->
  <script>
  (function() {
    function track(eventName, params) {
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push(Object.assign({ event: eventName }, params));
      if (window.parent !== window) {
        window.parent.postMessage(
          { source: 'beehive-eligibility-form', event: eventName, params: params },
          'https://www.beehive.ae'
        );
      }
    }

    // FORM START — first interaction with any field
    var started = false;
    document.addEventListener('focusin', function(e) {
      if (!started && e.target.matches('input, select, textarea')) {
        started = true;
        track('form_start', { form_name: 'funding_check_eligibility' });
      }
    });

    // STEP COMPLETE + FORM SUBMIT
    // This React form has no <form> element and re-renders its buttons, so we
    // delegate clicks. The primary button advances each step ("Continue") and
    // submits on the contact step ("Get My Eligibility"); "Begin" starts the flow.
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('.btn-primary, .intro-cta');
      if (!btn || btn.disabled) return;
      var label = (btn.textContent || '').trim().toLowerCase();
      if (label.indexOf('eligibility') !== -1) {
        track('form_submit', { form_name: 'funding_check_eligibility' });
      } else {
        track('form_step_complete', { form_name: 'funding_check_eligibility', step: label || 'unknown' });
      }
    });

    // DWELL TIME
    [30000, 60000, 120000].forEach(function(ms) {
      setTimeout(function() {
        track('dwell_time', { dwell_seconds: ms / 1000, page_path: 'funding-check-form' });
      }, ms);
    });
  })();
  </script>
